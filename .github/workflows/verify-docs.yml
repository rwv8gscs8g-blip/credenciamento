name: verify-docs

on:
  pull_request:
  push:
    branches:
      - main
      - codex/v180-stable-reset

jobs:
  verify-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f LICENSE
          test -f CHANGELOG.md
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f CLA.md
          test -f docs/INDEX.md
          test -f auditoria/INDEX.md

      - name: Validate auditoria index
        run: |
          for f in auditoria/*.md; do
            name="$(basename "$f")"
            grep -q "$name" auditoria/INDEX.md
          done
