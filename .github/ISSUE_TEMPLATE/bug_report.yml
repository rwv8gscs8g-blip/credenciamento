name: Bug report
description: Reportar defeito reproduzível
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: contexto
    attributes:
      label: Contexto
      description: Descreva o cenário e a versão afetada.
    validations:
      required: true
  - type: textarea
    id: passos
    attributes:
      label: Passos para reproduzir
    validations:
      required: true
  - type: textarea
    id: esperado
    attributes:
      label: Resultado esperado
    validations:
      required: true
  - type: textarea
    id: obtido
    attributes:
      label: Resultado obtido
    validations:
      required: true
